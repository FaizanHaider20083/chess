<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Training App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header with Player Info -->
        <header class="game-header">
            <div class="player-info opponent">
                <div class="player-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="player-details">
                    <span class="player-name">Rrrrobbyy (1522)</span>
                    <span class="player-flag">🇮🇹</span>
                </div>
                <div class="game-clock" id="blackClock">5:00</div>
            </div>
        </header>

        <!-- Main Game Interface -->
        <div class="game-interface">
            <!-- Left Panel: Evaluation Bar -->
            <div class="left-panel">
                <div class="evaluation-component">
                    <div class="eval-bar-container">
                        <div class="eval-bar" id="evaluationBar">
                            <div class="eval-indicator" id="evalIndicator"></div>
                        </div>
                        <div class="eval-value" id="evalValue">+0.46</div>
                    </div>
                </div>
            </div>

            <!-- Center Panel: Chess Board -->
            <div class="center-panel">
                <div class="chess-board-component">
                    <div class="chess-board" id="chessBoard">
                        <!-- Chess board will be generated by JavaScript -->
                    </div>
                    <div class="game-status-overlay" id="gameStatusOverlay">
                        <div id="statusMessage">Check!</div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Analysis Tools -->
            <div class="right-panel">
                <!-- Mode Selector Component -->
                <div class="mode-selector-component">
                    <div class="mode-tabs">
                        <button class="mode-tab active" data-mode="analysis">
                            <i class="fas fa-search"></i>
                            Analysis
                        </button>
                        <button class="mode-tab" data-mode="new-game">
                            <i class="fas fa-plus"></i>
                            New Game
                        </button>
                        <button class="mode-tab" data-mode="games">
                            <i class="fas fa-chess"></i>
                            Games
                        </button>
                        <button class="mode-tab" data-mode="players">
                            <i class="fas fa-users"></i>
                            Players
                        </button>
                    </div>
                    <div class="game-controls-bar">
                        <button class="reset-game-btn" id="resetGameBtn">
                            <i class="fas fa-redo"></i>
                            Reset Game
                        </button>
                        <button class="computer-toggle-btn" id="computerToggleBtn">
                            <i class="fas fa-robot"></i>
                            <span id="computerToggleText">Play vs Computer</span>
                        </button>
                        <button class="visualize-toggle-btn" id="visualizeToggleBtn">
                            <i class="fas fa-eye"></i>
                            <span id="visualizeToggleText">Visualize Mode</span>
                        </button>
                        <button class="undo-btn" id="undoBtn">
                            <i class="fas fa-undo"></i>
                            Undo
                        </button>
                        <div class="move-navigation" id="moveNavigation">
                            <button class="nav-btn" id="firstMoveBtn" title="Go to start">
                                <i class="fas fa-fast-backward"></i>
                            </button>
                            <button class="nav-btn" id="prevMoveBtn" title="Previous move">
                                <i class="fas fa-step-backward"></i>
                            </button>
                            <button class="nav-btn" id="nextMoveBtn" title="Next move">
                                <i class="fas fa-step-forward"></i>
                            </button>
                            <button class="nav-btn" id="lastMoveBtn" title="Go to current position">
                                <i class="fas fa-fast-forward"></i>
                            </button>
                            <span class="move-counter" id="moveCounter">Move 0/0</span>
                            <button class="return-to-game-btn" id="returnToGameBtn" style="display: none;" title="Return to live game">
                                <i class="fas fa-play"></i>
                                Return to Game
                            </button>
                        </div>
                        <div class="turn-indicator" id="turnIndicator">
                            <span id="currentTurn">White to move</span>
                        </div>
                    </div>
                </div>

                <!-- Engine Analysis Component -->
                <div class="engine-analysis-component">
                    <div class="component-header">
                        <h3>Moves</h3>
                        <div class="engine-info">
                            <span class="engine-settings">
                                <span class="eval-toggle active">Evaluation</span>
                                <span class="lines-toggle active">Lines</span>
                                <span class="explorer-toggle">Explorer</span>
                            </span>
                            <span class="engine-details">depth=28 | Stockfish 17.1 Lite</span>
                            <i class="fas fa-cog"></i>
                        </div>
                    </div>
                    
                    <div class="engine-lines" id="engineLines">
                        <!-- Engine lines will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Game Moves Component -->
                <div class="game-moves-component">
                    <div class="component-header">
                        <h3>Starting Position</h3>
                        <i class="fas fa-info-circle"></i>
                    </div>
                    
                    <div class="moves-list" id="movesList">
                        <!-- Game moves will be populated by JavaScript -->
                    </div>

                    <div class="game-result">
                        <div class="result-indicators">
                            <span class="result-item best"><i class="fas fa-circle"></i> 7 Best</span>
                            <span class="result-item excellent"><i class="fas fa-circle"></i> 3 Excellent</span>
                            <span class="result-item mistakes"><i class="fas fa-circle"></i> 4 Mistakes</span>
                        </div>
                        
                        <button class="game-review-btn">
                            <i class="fas fa-star"></i>
                            Game Review
                        </button>
                        
                        <div class="game-actions">
                            <button class="action-btn">
                                <i class="fas fa-plus"></i>
                                New 5 min
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-redo"></i>
                                Rematch
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Player Info -->
        <footer class="game-footer">
            <div class="player-info current-player">
                <div class="player-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="player-details">
                    <span class="player-name">DragonOfDomination (1522)</span>
                    <span class="player-flags">🇨🇦 ❤️</span>
                </div>
                <div class="game-clock" id="whiteClock">5:00</div>
                <div class="game-controls">
                    <i class="fas fa-share"></i>
                    <i class="fas fa-flag"></i>
                    <i class="fas fa-handshake"></i>
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </footer>
    </div>

    <!-- Audio Elements for Sound Effects -->
    <audio id="moveSound" preload="auto" style="display: none;">
        <source type="audio/mpeg">
        <!-- We'll generate these sounds programmatically -->
    </audio>
    <audio id="captureSound" preload="auto" style="display: none;">
        <source type="audio/mpeg">
    </audio>
    <audio id="checkSound" preload="auto" style="display: none;">
        <source type="audio/mpeg">
    </audio>
    <audio id="checkmateSound" preload="auto" style="display: none;">
        <source type="audio/mpeg">
    </audio>
    <audio id="clockTickSound" preload="auto" style="display: none;">
        <source type="audio/mpeg">
    </audio>

    <script src="{{ url_for('static', filename='js/sounds.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
</body>
</html>
